  <rect width="32" height="32" rx="7" fill="#1c1c1f"/>
  <!-- Envelope body -->
  <rect x="3" y="9" width="26" height="17" rx="2.5" fill="none" stroke="#f97316" stroke-width="1.4"/>
  <!-- Left flap -->
  <path d="M3 12 L13 18.5" stroke="#f97316" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right flap -->
