<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="40%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Subtle noise overlay for texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix in="noiseOut" type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Soft noise texture over bg -->
  <rect width="512" height="512" rx="108" fill="white" opacity="0.04" filter="url(#noise)"/>

  <!-- Top rule -->
  <line x1="72" y1="186" x2="440" y2="186" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Bottom rule -->
  <line x1="72" y1="326" x2="440" y2="326" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>

  <!-- Small corner ticks on rules (left side) -->
  <line x1="72" y1="178" x2="72" y2="194" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <line x1="440" y1="178" x2="440" y2="194" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <line x1="72" y1="318" x2="72" y2="334" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <line x1="440" y1="318" x2="440" y2="334" stroke="white" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>

  <!-- VANTA wordmark — inline stroke gives letters definition -->
  <text x="256" y="256"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="102"
        font-weight="800"
        letter-spacing="6"
        fill="white"
        stroke="rgba(251,146,60,0.35)"
        stroke-width="4"
        paint-order="stroke fill">VANTA</text>

  <!-- Tiny AI dot beneath wordmark -->
  <circle cx="256" cy="356" r="5" fill="white" opacity="0.5"/>
</svg>
